<form action="#" method="post">
 <fieldset>
 <legend>Información del participante</legend>

 <label for="nombre">Nombre completo:</label>
 <input type="text" id="nombre" name="nombre" required minlength="3" maxlength="80">

 <br><br>

 <label for="correo">Email de contacto:</label>
 <input type="email" id="correo" name="correo" required placeholder="usuario@correo.com">

 <br><br>

 <label for="telefono">Número celular:</label>
 <input type="tel" id="telefono" name="telefono" placeholder="0987654321" pattern="[0-9]{10}">

 <br><br>

 <label for="edad">Años cumplidos:</label>
 <input type="number" id="edad" name="edad" min="15" max="80" required>

 <br><br>

 <label for="fecha">Día de nacimiento:</label>
 <input type="date" id="fecha" name="fecha">
 </fieldset>

 <br>

 <fieldset>
 <legend>Formación educativa</legend>

 <label for="carrera">Programa o asignatura:</label>
 <input type="text" id="carrera" name="carrera" required>

 <br><br>

 <label for="nivel">Grado de formación:</label>
 <select id="nivel" name="nivel" required>
 <option value="">Elija una alternativa</option>
 <option value="bachillerato">Secundaria</option>
 <option value="tecnologico">Nivel técnico</option>
 <option value="universitario">Educación superior</option>
 </select>

 <br><br>

 <label for="institucion">Centro de estudios:</label>
 <input type="text" id="institucion" name="institucion">
 </fieldset>

 <br>

 <fieldset>
 <legend>Preferencias de capacitación</legend>

 <p>Tipo de asistencia:</p>

 <input type="radio" id="presencial" name="modalidad" value="presencial" required>
 <label for="presencial">En aula</label>

 <input type="radio" id="virtual" name="modalidad" value="virtual">
 <label for="virtual">En línea</label>

 <input type="radio" id="hibrida" name="modalidad" value="hibrida">
 <label for="hibrida">Combinada</label>

 <p>Áreas que desea aprender:</p>

 <input type="checkbox" id="html" name="temas" value="html">
 <label for="html">Estructura web</label>

 <input type="checkbox" id="css" name="temas" value="css">
 <label for="css">Diseño visual</label>

 <input type="checkbox" id="js" name="temas" value="javascript">
 <label for="js">Programación web</label>

 <br><br>

 <label for="color">Tono preferido:</label>
 <input type="color" id="color" name="color">

 <br><br>

 <label for="motivacion">Grado de entusiasmo:</label>
 <input type="range" id="motivacion" name="motivacion" min="1" max="10">
 </fieldset>

 <br>

 <fieldset>
 <legend>Horario disponible</legend>

 <label for="fecha_inicio">Día sugerido:</label>
 <input type="date" id="fecha_inicio" name="fecha_inicio">

 <br><br>

 <label for="hora">Hora sugerida:</label>
 <input type="time" id="hora" name="hora">

 <br><br>

 <label for="jornada">Horario preferido:</label>
 <select id="jornada" name="jornada">
 <option value="manana">Primer horario</option>
 <option value="tarde">Segundo horario</option>
 <option value="noche">Tercer horario</option>
 </select>
 </fieldset>

 <br>

 <fieldset>
 <legend>Datos complementarios</legend>

 <label for="archivo">Adjuntar documento:</label>
 <input type="file" id="archivo" name="archivo">

 <br><br>

 <label for="portafolio">Sitio web o perfil personal:</label>
 <input type="url" id="portafolio" name="portafolio" placeholder="https://misitio.com">

 <br><br>

 <label for="comentarios">Observaciones:</label>
 <br>
 <textarea id="comentarios" name="comentarios" rows="5" cols="40"></textarea>
 </fieldset>

 <br>

 <button type="submit">Registrar datos</button>
 <button type="reset">Borrar información</button>
</form>
